services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ai-auth-frontend-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3010:3000"
    networks:
      - ai-auth-net

  postgres:
    image: postgres:16-alpine
    container_name: ai-auth-frontend-postgres
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ai_auth_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - ai-auth-net

volumes:
  ai_auth_pg_data:

networks:
  ai-auth-net:
    name: ai-auth-net
